<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="joke-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <div class="header">
                <h1><i class="fas fa-laugh"></i> Joke Generator</h1>
                <p>Click the button to get a random joke!</p>
            </div>

            <div class="joke-display">
                <div class="joke-content" id="jokeContent">
                    <p>Click "Get Joke" to start laughing!</p>
                </div>
            </div>

            <div class="controls">
                <button id="getJokeBtn" class="btn btn-primary">
                    <i class="fas fa-dice"></i> Get Joke
                </button>
                <button id="copyBtn" class="btn btn-secondary" disabled>
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>

            <div class="joke-type">
                <label for="jokeType">Joke Type:</label>
                <select id="jokeType">
                    <option value="any">Any Type</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
            </div>

            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Getting a joke for you...</p>
            </div>

            <div class="error" id="errorMsg" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <p id="errorText"></p>
            </div>

            <div class="joke-history">
                <h3><i class="fas fa-history"></i> Recently Viewed</h3>
                <ul id="historyList">
                    <li class="placeholder">No jokes yet. Get your first joke!</li>
                </ul>
                <button id="clearHistoryBtn" class="btn btn-small" style="display: none;">
                    <i class="fas fa-trash"></i> Clear History
                </button>
            </div>
        </div>
    </div>

    <script src="joke-script.js"></script>
</body>
</html>
